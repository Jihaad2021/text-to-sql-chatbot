name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.11"]

    # Shared env vars — no duplication across steps
    env:
      OPENAI_API_KEY: sk-test-dummy
      ANTHROPIC_API_KEY: sk-ant-test-dummy
      SALES_DB_URL: postgresql://test:test@localhost:5432/test
      PRODUCTS_DB_URL: postgresql://test:test@localhost:5432/test
      ANALYTICS_DB_URL: postgresql://test:test@localhost:5432/test
      DEFAULT_LLM: openai
      DEFAULT_MODEL: gpt-4o
      CHROMA_PATH: ./chroma_db

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run unit tests with coverage
        run: |
          pytest tests/unit/ -v --tb=short \
            --cov=src \
            --cov-omit=src/pipeline/* \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=70

      - name: Upload coverage report
        if: always()
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          fail_ci_if_error: false

      - name: Run integration tests
        run: |
          pytest tests/integration/ -v --tb=short

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install linter
        run: pip install ruff

      - name: Run ruff
        run: |
          ruff check src/ tests/ --select E,F,W,I \
            --ignore E501 \
            --output-format github

  security:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install security tools
        run: pip install pip-audit bandit

      - name: Audit dependencies for CVEs
        run: pip-audit -r requirements.txt

      - name: Static security analysis
        # Exclude src/pipeline/: offline build scripts (not production runtime code)
        # -ll = medium and high severity only
        run: bandit -r src/ -ll --exclude src/pipeline --format text

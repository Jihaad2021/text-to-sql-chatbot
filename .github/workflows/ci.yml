name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.11"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run unit tests
        env:
          # Dummy values — unit tests mock all external calls
          OPENAI_API_KEY: sk-test-dummy
          ANTHROPIC_API_KEY: sk-ant-test-dummy
          SALES_DB_URL: postgresql://test:test@localhost:5432/test
          PRODUCTS_DB_URL: postgresql://test:test@localhost:5432/test
          ANALYTICS_DB_URL: postgresql://test:test@localhost:5432/test
          DEFAULT_LLM: openai
          DEFAULT_MODEL: gpt-4o
          CHROMA_PATH: ./chroma_db
        run: |
          pytest tests/unit/ -v --tb=short

      - name: Run integration tests
        env:
          OPENAI_API_KEY: sk-test-dummy
          ANTHROPIC_API_KEY: sk-ant-test-dummy
          SALES_DB_URL: postgresql://test:test@localhost:5432/test
          PRODUCTS_DB_URL: postgresql://test:test@localhost:5432/test
          ANALYTICS_DB_URL: postgresql://test:test@localhost:5432/test
          DEFAULT_LLM: openai
          DEFAULT_MODEL: gpt-4o
          CHROMA_PATH: ./chroma_db
        run: |
          pytest tests/integration/ -v --tb=short

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install linter
        run: pip install ruff

      - name: Run ruff
        run: |
          ruff check src/ tests/ --select E,F,W,I \
            --ignore E501 \
            --output-format github

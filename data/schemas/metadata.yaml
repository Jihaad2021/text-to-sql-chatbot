databases:
  - "financial_db"

schemas:
  - db_name: "financial_db"
    schema: "public"
    description: |
      The financial_db schema contains data on sales transactions, user engagement, and product pricing, enabling queries related to revenue analysis, user activity, and financial anomalies.
    tables:
      - table: "anomalies"
        description: |
          The anomalies table stores detected anomalies in financial transactions, including success rate drops (penurunan success rate, success rate turun, SR turun), transaction volume drops (penurunan transaksi), and revenue anomalies. Use this table for root cause analysis (analisis penyebab, kenapa, mengapa, penyebab penurunan), anomaly investigation (investigasi anomali), and detecting when metrics deviate from expected values. Key attributes: date, check_type, status, anomaly_type, severity (tingkat keparahan), deviation_pct (persentase deviasi), actual_value, expected_value, recommended_action. This is the primary table for anomaly detection, root cause investigation, and understanding why success rate or transaction volume dropped. Important synonyms: anomali, ketidakteraturan, deviasi, penyebab, kenapa, mengapa, penurunan success rate, success rate anomali, SR drop, root cause, investigasi, deteksi anomali, anomali mingguan.
        columns:
          - name: "id"
            description: |
              The id column holds a unique integer identifier for each anomaly record and is used as a primary key (PK) in queries to filter and join with other tables.
            type: "integer"
          - name: "date"
            description: |
              The date (tanggal) column holds the date of the anomaly occurrence and is used in queries to filter and group records based on specific time periods, serving as a timestamp for tracking anomalies.
            type: "date"
          - name: "check_type"
            description: |
              The check_type column holds the type of check performed on financial transactions and is used in queries to filter anomalies based on specific check types, serving as a status indicator (tipe pemeriksaan).
            type: "text"
          - name: "status"
            description: |
              The status (status) column holds the current state of the anomaly and is used in queries to filter results based on the anomaly's condition, serving as a status indicator (metric) for the records in the anomalies table.
            type: "text"
          - name: "entity_type"
            description: |
              The entity_type column holds the type of entity associated with the anomaly and is used in queries to filter results based on specific entity types, serving as a status indicator (tipe_entitas).
            type: "text"
          - name: "entity_id"
            description: |
              The entity_id (entitas_id) column holds a unique identifier for each entity associated with an anomaly and is used in queries to filter and join with other tables.
            type: "text"
          - name: "anomaly_type"
            description: |
              The anomaly_type column holds the classification of the detected anomaly and is used in queries to filter results based on specific types of anomalies (tipe anomali), serving as a non-key attribute for analysis.
            type: "text"
          - name: "severity"
            description: |
              The severity (tingkat keparahan) column holds a textual representation of the anomaly's severity level and is used in queries to filter and group results based on the criticality of the anomalies.
            type: "text"
          - name: "total_trx"
            description: |
              The total_trx column holds the total transaction amount associated with an anomaly and is used in queries to filter and aggregate data, serving as a metric (jumlah_trx).
            type: "double precision"
          - name: "total_revenue"
            description: |
              The total_revenue column holds the total revenue amount associated with each anomaly and is used in queries to filter and aggregate data, serving as a metric (metrik) for financial analysis.
            type: "double precision"
          - name: "avg_revenue"
            description: |
              The avg_revenue column holds the average revenue value associated with detected anomalies and is used in queries to filter and aggregate data, serving as a metric (metrik) for financial analysis.
            type: "double precision"
          - name: "zscore"
            description: |
              The zscore column holds a double precision value representing the statistical measure of how many standard deviations an anomaly is from the mean, and it is used in queries to filter and aggregate data related to anomalies (anomali) in financial transactions.
            type: "double precision"
          - name: "threshold_value"
            description: |
              The threshold_value column holds a double precision numeric value representing the predefined limit for detecting anomalies and is used in queries to filter and aggregate data related to financial irregularities, serving as a metric (nilai ambang).
            type: "double precision"
          - name: "actual_value"
            description: |
              The actual_value column holds the numerical representation of the observed financial metric and is used in queries to filter and aggregate data related to anomalies, serving as a metric (nilai) for analysis.
            type: "double precision"
          - name: "expected_value"
            description: |
              The expected_value column holds the anticipated monetary amount for a transaction and is used in queries to filter and aggregate data related to financial anomalies (nilai yang diharapkan).
            type: "double precision"
          - name: "deviation_pct"
            description: |
              The deviation_pct column holds the percentage of deviation from expected values and is used in queries to filter and aggregate anomalies based on their severity, serving as a metric (persentase deviasi) for assessing financial discrepancies.
            type: "double precision"
          - name: "description"
            description: |
              The description column holds a textual explanation of the anomaly and is used in queries to filter results based on specific characteristics of the anomaly (deskripsi).
            type: "text"
          - name: "recommended_action"
            description: |
              The recommended_action column holds text values that suggest corrective measures for identified anomalies and is used in queries to filter results based on specific recommendations (tindakan yang disarankan).
            type: "text"
          - name: "impact_estimate"
            description: |
              The impact_estimate column holds a double precision value representing the estimated financial impact of an anomaly, which can be used in queries to filter or aggregate data based on its significance, serving as a metric (estimasi dampak).
            type: "double precision"
          - name: "payment_provider"
            description: |
              The payment_provider (penyedia_pembayaran) column holds the name of the payment service used for transactions and is utilized in queries to filter and group anomalies by the specific provider.
            type: "text"
          - name: "partner"
            description: |
              The partner (mitra) column holds the name of the business partner associated with the anomaly and is used in queries to filter results based on specific partners or to join with other tables for detailed analysis.
            type: "text"
          - name: "product_name"
            description: |
              The product_name column holds the name of the product associated with each anomaly and is used in queries to filter results based on specific products (produk) or to group anomalies by product for analysis.
            type: "text"
          - name: "service_code"
            description: |
              The service_code (kode_layanan) column holds the unique identifier for the service associated with each anomaly and is used in queries to filter and join with other tables to analyze service-related issues.
            type: "text"
          - name: "first_detected"
            description: |
              The first_detected column holds the date when an anomaly was first identified and is used in queries to filter or group records based on the detection date, serving as a timestamp (tanggal).
            type: "date"
          - name: "last_detected"
            description: |
              The last_detected column holds the date when the anomaly was last identified and is used in queries to filter or group records based on the recency of detection (tanggal).
            type: "date"
          - name: "frequency_days"
            description: |
              The frequency_days column holds an integer value representing the number of days between detected anomalies, and it is used in queries to filter and group results based on the frequency of occurrences, serving as a metric (frekuensi).
            type: "integer"
      - table: "daily_master"
        description: |
          The daily_master table stores daily financial transaction data for various partners, with the primary key being the id column and key attributes including date, total_trx, and total_revenue. This table answers business questions related to transaction performance and revenue generation, with important synonyms users might search including "daily transactions," "revenue," "partner," "pengguna unik," and "rasio keberhasilan."
        columns:
          - name: "id"
            description: |
              The id column holds a unique integer value that serves as the primary key (PK) for identifying each record in the daily_master table and is often used in join operations with other tables.
            type: "integer"
          - name: "date"
            description: |
              The date (tanggal) column holds the specific date of each transaction record and is used to filter and group data in queries, serving as a key metric for analyzing daily financial activities.
            type: "date"
          - name: "partner"
            description: |
              Sub-channel detail column — values include gopay_paybill, gopay_wec, dana_wec, linkaja_basic, etc. DO NOT use this column for partner-level GROUP BY or ranking queries — it will produce 25 fragmented rows mixing brands and sub-channels. Use partner_group instead for any partner analysis.
            type: "text"
          - name: "partner_group"
            description: |
              PREFERRED column for all partner analysis (mitra). Consolidated brand name that groups all sub-channels: gopay, dana, ovo, qris, finnet, linkaja, shopeepay, indomaret, telkomsel_wallet (9 values). Always GROUP BY partner_group when the question asks about partner performance, ranking, share, MoM, or comparison. Only use the partner column when the question specifically asks about sub-channels (paybill, wec, basic variants).
            type: "text"
          - name: "total_trx"
            description: |
              The total_trx column holds the total number of transactions for a given day and is used in queries to filter, group, and aggregate transaction data, serving as a metric (metrik) for financial analysis.
            type: "bigint"
          - name: "success_trx"
            description: |
              The success_trx column holds the total number of successful transactions (transaksi sukses) and is used in queries to filter and aggregate data for performance metrics, serving as a metric in the financial_db.
            type: "double precision"
          - name: "failed_trx"
            description: |
              The failed_trx column holds the number of failed transactions (transaksi gagal) and is used in queries to filter and aggregate data related to transaction performance, serving as a metric for assessing operational efficiency.
            type: "double precision"
          - name: "total_revenue"
            description: |
              The total_revenue column holds the total income generated for a given day and is used in queries to aggregate financial performance metrics, serving as a key metric (metrik) in the daily_master table.
            type: "double precision"
          - name: "success_rate_pct"
            description: |
              The success_rate_pct column holds the percentage of successful transactions relative to total transactions and is used in queries to filter and aggregate data for performance analysis, serving as a metric (persentase keberhasilan) in the daily_master table.
            type: "double precision"
          - name: "unique_users"
            description: |
              The unique_users column holds the count of distinct users for a given day and is used in queries to aggregate user activity metrics, serving as a key metric (metrik) for analyzing user engagement in the financial database.
            type: "bigint"
      - table: "daily_unique_users"
        description: |
          The daily_unique_users table stores information about the number of unique users interacting with a system on a daily basis, with the primary key being the id and key attributes including date and unique_users. This table answers business questions related to user engagement trends and retention, with important synonyms users might search including "daily users," "unique users," "pengguna harian," and "pengguna unik."
        columns:
          - name: "id"
            description: |
              The id column holds a unique integer identifier for each record in the daily_unique_users table, used as the primary key (PK) to filter and join with other tables in queries (id).
            type: "integer"
          - name: "date"
            description: |
              The date (tanggal) column holds the specific date for each record and is used to filter and group daily unique user counts, serving as a primary key (PK) for the table.
            type: "date"
          - name: "month"
            description: |
              The month column holds the first date of the month (e.g. 2026-06-01) and is used to group daily records into monthly periods for monthly user analysis.
            type: "date"
          - name: "unique_users"
            description: |
              The unique_users column holds the count of distinct users for that day and is used in queries to aggregate daily user activity metrics (pengguna unik harian).
            type: "bigint"
          - name: "unique_users_monthly"
            description: |
              The unique_users_monthly column holds the cumulative count of unique users from the start of the month up to the given date and is used for monthly user engagement analysis (pengguna unik bulanan kumulatif).
            type: "bigint"
          - name: "unique_users_daily"
            description: |
              The unique_users_daily column holds the rolling daily unique user count and is used in queries to track day-over-day changes in user activity (pengguna harian).
            type: "bigint"
      - table: "financial_internal"
        description: |
          The financial_internal table stores detailed revenue and fee breakdown records per partner (payment_provider), with key attributes including date, payment_provider (partner/mitra: GoPay, OVO, Dana, LinkAja, ShopeePay, Telkomsel), total_net_revenue (pendapatan bersih, revenue bersih), total_platform_fee (biaya platform), total_admin_fee (biaya admin), and net_gap (selisih). Use this table for revenue analysis: revenue trend (tren revenue, tren pendapatan), revenue drop (penurunan revenue, revenue turun, pendapatan turun), revenue per partner (revenue per mitra, pendapatan per partner), partner revenue ranking (ranking revenue partner, partner revenue terbesar), revenue comparison between partners, fee analysis, net gap, and partner monitoring based on revenue (partner mana yang perlu diperhatikan berdasarkan revenue, partner kritis revenue, monitoring partner revenue, evaluasi partner berdasarkan revenue, rekomendasi partner revenue, partner yang perlu dipantau). This is the primary table for financial/revenue metrics, monthly partner revenue data, and identifying which partners need attention based on revenue performance. Important synonyms: pendapatan, revenue, penurunan pendapatan, tren pendapatan, tren revenue, biaya platform, biaya admin, selisih, net gap, partner revenue, mitra revenue, partner perlu diperhatikan, partner kritis, monitoring revenue.
        columns:
          - name: "id"
            description: |
              The id column holds a unique integer value that serves as the primary key (PK) for identifying each record in the financial_internal table and is often used in join operations with other tables.
            type: "integer"
          - name: "date"
            description: |
              The date (tanggal) column holds the transaction date and is used to filter and group records in queries, serving as a timestamp for financial transactions.
            type: "date"
          - name: "payment_provider"
            description: |
              The payment_provider column holds the name of the payment partner (mitra/partner: GoPay, OVO, Dana, LinkAja, ShopeePay, Telkomsel) and is used to filter or group revenue records by partner. Equivalent to partner or partner_group in other tables.
            type: "text"
          - name: "transaction_type"
            description: |
              The transaction_type column holds the type of financial transaction (e.g., sale, refund) and is used in queries to filter results, making it a key metric for analyzing transaction patterns in the financial_internal table (tipe_transaksi).
            type: "text"
          - name: "item_type"
            description: |
              The item_type column holds the type of financial item (e.g., service, product) and is used in queries to filter results, making it a key metric (tipe_item) for analyzing transaction data in the financial_internal table.
            type: "text"
          - name: "total_trx"
            description: |
              The total_trx column holds the total number of transactions (jumlah transaksi) and is used in queries to aggregate transaction counts for reporting purposes, serving as a metric.
            type: "bigint"
          - name: "total_net_revenue"
            description: |
              The total_net_revenue column holds the total revenue generated after deducting fees and is used in queries to filter and aggregate financial data, serving as a metric (metrik) for assessing overall financial performance.
            type: "double precision"
          - name: "net_gap"
            description: |
              The net_gap column holds the calculated difference between total revenue and total fees for each transaction, and it is used in queries to filter and aggregate financial data, serving as a metric (selisih) for assessing profitability.
            type: "double precision"
          - name: "total_platform_fee"
            description: |
              The total_platform_fee column holds the total fees charged by the platform for transactions and is used in queries to filter and aggregate financial data, serving as a metric (biaya total).
            type: "double precision"
          - name: "total_admin_fee"
            description: |
              The total_admin_fee column holds the total administrative fees associated with transactions and is used in queries to filter or aggregate financial data, serving as a metric (biaya_admin).
            type: "double precision"
      - table: "daily_user_partner"
        description: |
          The daily_user_partner table stores data about unique users interacting with various partners on specific dates, with the primary key being the id and key attributes including date, partner, and unique_users. This table answers business questions related to user engagement trends over time and partner performance, with important synonyms users might search including "daily users," "partner engagement," "pengguna unik," and "mitra."
        columns:
          - name: "id"
            description: |
              The id column holds a unique integer value that serves as the primary key (PK) for identifying each record in the daily_user_partner table, and it is often used in join operations to link related data across tables (id).
            type: "integer"
          - name: "date"
            description: |
              The date (tanggal) column holds the specific date for each record and is used to filter and group data in queries, serving as a timestamp for daily user metrics.
            type: "date"
          - name: "partner"
            description: |
              The partner (mitra) column holds the name of the partner organization and is used in queries to filter or group results based on specific partners, serving as a foreign key (FK) to link to related partner information in other tables.
            type: "text"
          - name: "unique_users"
            description: |
              The unique_users column holds the count of distinct users for each partner on a given date and is used in queries to aggregate user data, serving as a metric (metrik) for analyzing user engagement.
            type: "bigint"
      - table: "hourly_pattern_daily"
        description: |
          The hourly_pattern_daily table stores daily transaction patterns with its primary key as id, and key attributes including date, hour, total_trx, and success_rate_pct. This table answers business questions related to transaction trends over time, such as peak hours for transactions and success rates, with important synonyms including transaction patterns, pola transaksi, and tingkat keberhasilan.
        columns:
          - name: "id"
            description: |
              The id column holds a unique integer value that serves as the primary key (PK) for identifying each record in the hourly_pattern_daily table and is used in queries to filter and join with other tables.
            type: "integer"
          - name: "date"
            description: |
              The date (tanggal) column holds the specific date for each record and is used to filter and group transactions in queries, serving as a primary key (PK) for identifying daily patterns in financial data.
            type: "date"
          - name: "hour"
            description: |
              The hour (jam) column holds integer values representing the hour of the day and is used in queries to filter or group transaction data by specific hours, serving as a key metric for analyzing daily transaction patterns.
            type: "integer"
          - name: "total_trx"
            description: |
              The total_trx column holds the total number of transactions for a given hour and date, and it is used in queries to aggregate transaction data and filter results based on transaction counts (jumlah_trx).
            type: "bigint"
          - name: "success_rate_pct"
            description: |
              The success_rate_pct column holds the percentage of successful transactions for a given hour and date, and it is used in queries to filter and aggregate data for performance analysis (persentase keberhasilan).
            type: "double precision"
      - table: "product_summary"
        description: |
          The product_summary table stores information about product transactions, with the primary key being the id, and key attributes including product_id, product_name, total_revenue, and success_rate_pct. This table answers business questions related to product performance and sales metrics, with important synonyms users might search including "produk," "transaksi," "pendapatan," and "pembayaran."
        columns:
          - name: "id"
            description: |
              The id column holds a unique integer identifier for each product summary record, serving as the primary key (PK) for filtering and joining with other tables in queries (identifikasi).
            type: "integer"
          - name: "date"
            description: |
              The date (tanggal) column holds the transaction date and is used in queries to filter or group records by specific dates, serving as a timestamp for the financial transactions in the product_summary table.
            type: "date"
          - name: "product_id"
            description: |
              The product_id (id produk) column holds unique identifiers for each product and is used in queries to filter and join with other tables, serving as a primary key (PK).
            type: "text"
          - name: "product_name"
            description: |
              The product_name column holds the name of the product and is used in queries to filter results, serving as a metric for identifying and analyzing product performance within the product_summary table (nama produk).
            type: "text"
          - name: "item_type"
            description: |
              The item_type column holds the type of product (e.g., physical, digital) and is used in queries to filter or group results, serving as a status (status) indicator for transactions in the financial database.
            type: "text"
          - name: "type_of_payment"
            description: |
              The type_of_payment column holds the method of payment used for transactions and is utilized in queries to filter results based on payment methods, serving as a status (status) indicator for financial transactions.
            type: "text"
          - name: "payment_provider"
            description: |
              The payment_provider (penyedia_pembayaran) column holds the name of the payment service used for transactions and is utilized in queries to filter or group results based on the payment method, serving as a non-primary key attribute.
            type: "text"
          - name: "total_trx"
            description: |
              The total_trx column holds the total number of transactions (transaksi) for each product and is used in queries to aggregate data, serving as a metric for analyzing product performance.
            type: "bigint"
          - name: "total_revenue"
            description: |
              The total_revenue column holds the total income generated from sales (pendapatan) and is used in queries to aggregate financial performance metrics, serving as a key metric for analysis.
            type: "double precision"
          - name: "success_trx"
            description: |
              The success_trx column holds the total number of successful transactions (transaksi berhasil) and is used in queries to aggregate data for performance metrics, serving as a metric in the product_summary table.
            type: "double precision"
          - name: "success_rate_pct"
            description: |
              The success_rate_pct column holds the percentage of successful transactions for each product and is used in queries to filter and aggregate data, serving as a metric (persentase keberhasilan) for evaluating product performance.
            type: "double precision"
          - name: "unique_buyers"
            description: |
              The unique_buyers column holds the count of distinct customers who made purchases and is used in queries to aggregate data for metrics related to customer engagement (pembeli unik).
            type: "bigint"
          - name: "repeat_buyers"
            description: |
              The repeat_buyers column holds the count of customers who have made multiple purchases of a product and is used in queries to filter and aggregate data for metrics analysis (metrik) while serving as a non-primary key status indicator.
            type: "bigint"
          - name: "settlement_gap"
            description: |
              The settlement_gap (selisih_settlement) column holds a double precision value representing the difference in settlement amounts and is used in queries to filter and aggregate financial data related to transactions.
            type: "double precision"
          - name: "purchase_mode"
            description: |
              The purchase_mode column holds the method by which a product was purchased (e.g., online, in-store) and is used in queries to filter or group transactions, serving as a status indicator (mode pembelian).
            type: "text"
      - table: "channel_payment"
        description: |
          The channel_payment table stores information about payment transactions made through various channels, with the primary key being id, and key attributes including date, partner, channel, purchase_mode, total_trx, total_revenue, and success_rate_pct. This table answers business questions related to payment performance and channel effectiveness, with important synonyms users might search including payment channel, transaksi pembayaran, saluran, and revenue.
        columns:
          - name: "id"
            description: |
              The id column holds a unique integer value that serves as the primary key (PK) for identifying each record in the channel_payment table and is commonly used in join operations with other tables.
            type: "integer"
          - name: "date"
            description: |
              The date (tanggal) column holds the transaction date and is used in queries to filter and group records by specific time periods, serving as a timestamp for the channel_payment table.
            type: "date"
          - name: "partner"
            description: |
              The partner (mitra) column holds the name of the payment partner and is used in queries to filter and group transaction data by specific partners, serving as a key attribute for analyzing payment performance.
            type: "text"
          - name: "channel"
            description: |
              The column "channel" holds the type of payment channel used for transactions and is utilized in queries to filter or group results based on payment methods (saluran).
            type: "text"
          - name: "purchase_mode"
            description: |
              The purchase_mode column holds the method of payment used for transactions and is utilized in queries to filter or group results based on payment types (metode pembelian).
            type: "text"
          - name: "total_trx"
            description: |
              The total_trx column holds the total number of transactions (jumlah transaksi) and is used in queries to aggregate data for reporting purposes, serving as a metric in the financial_db's channel_payment table.
            type: "bigint"
          - name: "total_revenue"
            description: |
              The total_revenue column holds the total revenue generated from transactions (pendapatan) and is used in queries to aggregate financial data for reporting and analysis.
            type: "double precision"
          - name: "success_rate_pct"
            description: |
              The success_rate_pct column holds the percentage of successful transactions for each payment channel and is used in queries to filter and aggregate data, serving as a metric (persentase keberhasilan) for evaluating payment performance.
            type: "double precision"
      - table: "daily_product_channel"
        description: |
          The daily_product_channel table stores daily transaction and revenue data for various products across different sales channels, with the primary key being the id and key attributes including date, product_name, and transaction/revenue figures for each channel. This table answers business questions related to daily sales performance and revenue generation, with important synonyms users might search including "daily sales," "produk," "transaksi," and "pendapatan."
        columns:
          - name: "id"
            description: |
              The id column holds a unique integer value that serves as the primary key (PK) for identifying each record in the daily_product_channel table and is often used in join operations with other tables.
            type: "integer"
          - name: "date"
            description: |
              The date (tanggal) column holds the specific date for each record and is used in queries to filter results by date, group data by date for aggregation, and join with other tables based on date, serving as a timestamp.
            type: "date"
          - name: "product_name"
            description: |
              The product_name column holds the name of the product and is used in queries to filter results based on specific products or to group data for aggregation, serving as a non-key attribute in the daily_product_channel table.
            type: "text"
          - name: "a0_trx"
            description: |
              The a0_trx column holds the total number of transactions for a specific product channel on a given date and is used in queries to filter, group, and aggregate transaction data, serving as a metric (metrik) for financial analysis.
            type: "bigint"
          - name: "a0_revenue"
            description: |
              The a0_revenue column holds the revenue generated from a specific product channel on a given day and is used in queries to filter, group, and aggregate financial data, serving as a metric (metrik) for performance analysis.
            type: "double precision"
          - name: "b3_trx"
            description: |
              The b3_trx column holds the transaction count for the B3 product channel and is used in queries to filter, group, and aggregate data, serving as a metric (metrik) for financial analysis.
            type: "bigint"
          - name: "b3_revenue"
            description: |
              The b3_revenue column holds the revenue generated from the B3 product channel and is used in queries to aggregate total revenue, filter results by specific revenue thresholds, and join with other financial metrics, serving as a metric (metrik).
            type: "double precision"
          - name: "f0_trx"
            description: |
              The f0_trx column holds the transaction count for a specific product channel and is used in queries to filter, group, and aggregate data, serving as a metric (metrik) for financial analysis.
            type: "bigint"
          - name: "f0_revenue"
            description: |
              The f0_revenue column holds the revenue generated from a specific product channel on a given day and is used in queries to filter, group, and aggregate financial data, serving as a metric (metrik) for performance analysis.
            type: "double precision"
